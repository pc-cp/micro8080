name: CPU Simulator Tests

# This tells GitHub to run the tests every time you push to the 'main' branch,
# or when someone submits a Pull Request to 'main'.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # This matrix allows you to test across multiple Python versions at once!
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    # 1. Grab your code from the repository
    - name: Check out repository
      uses: actions/checkout@v4

    # 2. Set up the Python environment
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. Install pytest (and any other requirements)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # If you have a requirements.txt, this will install it automatically
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Run the tests!
    - name: Run tests with pytest
      run: |
        # Pytest will automatically search your project for any files starting 
        # with 'test_' and run all the functions inside them starting with 'test_'
        pytest -v